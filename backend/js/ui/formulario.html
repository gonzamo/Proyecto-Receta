<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Receta</title>
    <link rel="stylesheet" href="style-form.css">
</head>

<body>

    <form id="formReceta">

        <h2>Crear receta</h2>
        <input type="hidden" id="recetaId">

        <!-- Nombre -->
        <label>Nombre</label>
        <input type="text" id="nombre" required />

        <!-- Categoría -->
        <label>Categoría</label>
        <select id="categoria" required>
            <option value="">Selecciona una categoría</option>
            <option value="Postre">Postre</option>
            <option value="Principal">Principal</option>
            <option value="Entrante">Entrante</option>
        </select>

        <!-- Tiempo de preparación -->
        <label>Tiempo de preparación (minutos)</label>
        <input type="number" id="tiempoPreparacion" min="0" required/>

        <!-- Ingredientes -->
        <label>Ingredientes (separados por comas)</label>
        <textarea id="ingredientes" placeholder="ej: tomate, cebolla, sal" required></textarea>

        <!-- Botones -->
        <button type="submit">Crear receta</button>
        <button type="button" id="cerrarModal">Cerrar</button>

    </form>
</body>
<script type="module" src="/app.js"></script>

</html>
